name : CI

on : 
  push :
  pull_request :
    branches :
      - leancage-analysis
      - recuritment-analysis
      - resume-analysis
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: python -m py_compile app.py
