tags:
  - Interview
summary: 면접 모범 답변 생성
description: 특정 면접 질문에 대한 AI 모범 답변을 생성합니다.
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - question
        - cover_letter
        - intent
        - suggested_keywords
      properties:
        question:
          type: string
          description: 면접 질문
          example: "프로젝트에서 가장 어려웠던 기술적 도전은 무엇인가요?"
        cover_letter:
          type: string
          description: 자기소개서 전문
          example: "저는 3년간 스타트업에서 풀스택 개발자로..."
        intent:
          type: string
          description: 질문 의도
          example: "문제 해결 능력과 기술적 깊이를 확인하는 질문"
        suggested_keywords:
          type: array
          description: 답변에 포함할 핵심 키워드
          items:
            type: string
          example:
            - "트러블슈팅"
            - "성능 최적화"
        style:
          type: string
          enum: [기본형, 압박형, 균형형]
          default: 기본형
        difficulty:
          type: string
          enum: [신입, 경력]
          default: 신입
responses:
  200:
    description: 모범 답변 생성 성공
    schema:
      type: object
      properties:
        sample_answer:
          type: string
  500:
    description: 생성 실패
    schema:
      type: object
      properties:
        detail:
          type: string
