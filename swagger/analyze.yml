tags:
  - GitHub
summary: GitHub + 채용공고 매칭 분석
description: GitHub 사용자명과 채용공고 URL로 기술 스택을 추출하고 채용공고와 매칭합니다. GitHub 분석과 채용공고 크롤링을 병렬 실행합니다.
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - github_username
        - job_urls
      properties:
        github_username:
          type: string
          description: 분석할 GitHub 사용자명
          example: "kimcoding"
        job_urls:
          type: array
          minItems: 1
          maxItems: 5
          description: 매칭할 채용공고 URL 목록 (최대 5개)
          items:
            type: string
          example:
            - "https://www.jobkorea.co.kr/Recruit/GI_Read/12345678"
responses:
  200:
    description: 매칭 분석 성공
    schema:
      type: object
      properties:
        github:
          type: object
          properties:
            username:
              type: string
            confirmed_skills:
              type: array
              items:
                type: string
            inferred_skills:
              type: array
              items:
                type: string
            raw_languages:
              type: object
            package_skills:
              type: array
              items:
                type: string
        matching:
          type: array
          items:
            type: object
            properties:
              url_index:
                type: integer
              status:
                type: string
                enum: [success, failed]
              title:
                type: string
              company:
                type: string
              job_type:
                type: string
              tech_stack:
                type: array
                items:
                  type: string
  400:
    description: 요청 파라미터 오류
    schema:
      type: object
      properties:
        error:
          type: string
  404:
    description: GitHub 사용자 없음
    schema:
      type: object
      properties:
        error:
          type: string
