tags:
  - Resume
summary: 이력서-GitHub 기술 대조 분석
description: 이력서에 기재된 기술과 GitHub 실제 코드를 대조하여 검증된 기술과 미검증 기술을 분류합니다.
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - github_username
        - tech_stack
      properties:
        resume_text:
          type: string
          description: 이력서 텍스트 (없으면 저장된 프로필 이력서 사용)
          example: "React, TypeScript, Node.js 개발 경험 3년..."
        resume_url:
          type: string
          description: 이력서 URL (선택)
          example: ""
        github_username:
          type: string
          description: GitHub 사용자명
          example: "kimcoding"
        tech_stack:
          type: array
          description: 이력서에서 추출한 기술 목록
          items:
            type: string
          example:
            - "React"
            - "TypeScript"
            - "Node.js"
responses:
  200:
    description: 대조 분석 성공
    schema:
      type: object
      properties:
        overall_evaluation:
          type: string
        resume_skills:
          type: array
          items:
            type: string
        github_skills:
          type: array
          items:
            type: string
        verified_skills:
          type: array
          items:
            type: string
        unverified_skills:
          type: array
          items:
            type: string
        newly_discovered_skills:
          type: array
          items:
            type: string
        supplement_advice:
          type: string
        update_suggestion:
          type: string
  500:
    description: 분석 실패
    schema:
      type: object
      properties:
        detail:
          type: string
