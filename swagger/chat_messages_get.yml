tags:
  - name: Chat
summary: 채팅 메시지 목록 조회
description: 특정 세션의 모든 메시지를 시간 순으로 반환합니다.
produces:
  - application/json
parameters:
  - name: session_id
    in: path
    type: integer
    required: true
    description: 조회할 세션 ID
    example: 1
responses:
  200:
    description: 메시지 목록 반환
    schema:
      type: array
      items:
        type: object
        properties:
          message_id:
            type: integer
          session_id:
            type: integer
          role:
            type: string
            enum: ["user", "assistant"]
          content:
            type: string
          created_at:
            type: string
            example: "2026-06-29T14:30:00"
