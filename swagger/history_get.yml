tags:
  - History
summary: 분석 이력 조회
description: 현재 세션의 분석 이력 목록을 최신순으로 반환합니다.
responses:
  200:
    description: 이력 조회 성공
    schema:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            example: "hist-a1b2c3"
          type:
            type: string
            enum: [github, gap, resume-github, interview, cover-letter]
            example: "github"
          date:
            type: string
            example: "2026-06-29 14:30"
          summary:
            type: string
            example: "GitHub 분석: 매칭 적합도 75%"
