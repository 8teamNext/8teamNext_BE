tags:
  - Utility
summary: 텍스트 암호화
description: 입력된 텍스트를 서버 암호화 키로 암호화합니다. (이력서/자소서 저장 전 테스트용)
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      properties:
        text:
          type: string
          description: 암호화할 텍스트
          example: "민감한 이력서 내용..."
responses:
  200:
    description: 암호화 성공
    schema:
      type: object
      properties:
        encrypted:
          type: string
          description: 암호화된 텍스트 (빈 문자열 입력 시 빈 문자열 반환)
  500:
    description: 암호화 실패
    schema:
      type: object
      properties:
        detail:
          type: string
