tags:
  - name: Debug
summary: 채용공고 크롤링 디버그
description: 단일 채용공고 URL을 크롤링하여 파싱 결과를 원문과 함께 반환합니다. (디버그용)
produces:
  - application/json
parameters:
  - name: url
    in: query
    type: string
    required: true
    description: 크롤링할 채용공고 URL
    example: "https://www.jobkorea.co.kr/Recruit/GI_Read/12345"
responses:
  200:
    description: 크롤링 성공
    schema:
      type: object
      properties:
        error:
          type: string
          nullable: true
        title:
          type: string
        company:
          type: string
        job_type:
          type: string
        tasks:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            type: string
        tech_stack:
          type: array
          items:
            type: string
        raw_text_length:
          type: integer
        raw_text_preview:
          type: string
  400:
    description: url 파라미터 누락
    schema:
      type: object
      properties:
        detail:
          type: string
