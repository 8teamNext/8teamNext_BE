tags:
  - name: Analyze
summary: 자기소개서 비교 분석
description: 원본 자기소개서와 개선된 자기소개서를 비교하여 차이점 및 개선 효과를 분석합니다.
consumes:
  - application/json
produces:
  - application/json
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - original_text
        - improved_text
      properties:
        original_text:
          type: string
          description: 원본 자기소개서
          example: "저는 성실하고 열심히 일하는 개발자입니다..."
        improved_text:
          type: string
          description: 개선된 자기소개서
          example: "3년간 Python 백엔드 개발 경험을 통해 MSA 전환 프로젝트를 주도하였습니다..."
responses:
  200:
    description: 비교 분석 성공
    schema:
      type: object
      properties:
        overall_summary:
          type: string
        improved_expressions:
          type: array
          items:
            type: object
            properties:
              original:
                type: string
              improved:
                type: string
              reason:
                type: string
        added_experiences:
          type: array
          items:
            type: string
        strengthened_techs:
          type: array
          items:
            type: string
        remaining_gaps:
          type: array
          items:
            type: string
  500:
    description: 분석 실패
    schema:
      type: object
      properties:
        detail:
          type: string
