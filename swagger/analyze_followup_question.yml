tags:
  - name: Interview
summary: 꼬리 질문 생성
description: 면접 답변을 바탕으로 심화 꼬리 질문을 생성합니다.
consumes:
  - application/json
produces:
  - application/json
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - question
        - user_answer
      properties:
        question:
          type: string
          description: 원래 면접 질문
          example: "본인의 가장 도전적인 프로젝트 경험을 말해주세요."
        user_answer:
          type: string
          description: 면접자의 답변
          example: "저는 대용량 데이터 처리 시스템을 개선한 경험이 있습니다..."
responses:
  200:
    description: 꼬리 질문 생성 성공
    schema:
      type: object
      properties:
        followup_question:
          type: string
        intent:
          type: string
  400:
    description: 답변 입력 필요
    schema:
      type: object
      properties:
        detail:
          type: string
  500:
    description: 생성 실패
    schema:
      type: object
      properties:
        detail:
          type: string
