tags:
  - Interview
summary: 꼬리 질문 생성
description: 면접 질문과 사용자 답변을 기반으로 AI 꼬리 질문을 생성합니다.
parameters:
  - in: body
    name: body
    required: true
    schema:
      type: object
      required:
        - question
        - user_answer
      properties:
        question:
          type: string
          description: 원래 면접 질문
          example: "REST API와 GraphQL의 차이를 설명해주세요."
        user_answer:
          type: string
          description: 사용자가 입력한 답변
          example: "REST는 엔드포인트마다 고정된 데이터를 반환하고, GraphQL은 클라이언트가 필요한 데이터만 요청할 수 있습니다."
responses:
  200:
    description: 꼬리 질문 생성 성공
    schema:
      type: object
      properties:
        followup_question:
          type: string
        intent:
          type: string
  400:
    description: 답변이 비어 있음
    schema:
      type: object
      properties:
        detail:
          type: string
  500:
    description: 생성 실패
    schema:
      type: object
      properties:
        detail:
          type: string
